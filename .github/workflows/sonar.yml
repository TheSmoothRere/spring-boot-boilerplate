name: SonarQube Analysis

on:
  push:
    branches:
      - master

jobs:
  sonar:
    name: Build & Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Start Dependencies (Docker Compose)
        run: |
          docker compose up -d
          
          echo "Waiting database to be healthy..."
          docker compose ps

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Build, Test & Run Sonar
        env:
          SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        run: ./gradlew clean test sonar --info

      - name: Stop Dependencies
        if: always()
        run: |
          docker compose down
